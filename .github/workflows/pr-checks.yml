name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Detect which files changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
            workflows:
              - '.github/workflows/**'

  # Test only if Go files changed
  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest

    container:
      image: golang:1.22-alpine

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: apk add --no-cache gcc musl-dev

      - name: Run tests
        run: go test -race -short ./...
        env:
          DATABASE_URL: postgres://test:test@postgres:5432/test?sslmode=disable

  # Build Docker image to verify it works
  docker-build:
    name: Docker Build Test
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: taskservice:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Validate workflow files
  validate-workflows:
    name: Validate Workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        uses: mpalmer/action-validator@v0.8.0
        with:
          path: '.github/workflows'

  # Add PR comment with build status
  pr-comment:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: always()
    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = '${{ needs.test.result }}';
            const dockerResult = '${{ needs.docker-build.result }}';

            let status = '✅ All checks passed';
            if (testResult === 'failure' || dockerResult === 'failure') {
              status = '❌ Some checks failed';
            } else if (testResult === 'skipped' && dockerResult === 'skipped') {
              status = '⏭️ No relevant changes detected';
            }

            const body = `## PR Check Summary

            ${status}

            | Check | Status |
            |-------|--------|
            | Tests | ${testResult === 'success' ? '✅' : testResult === 'skipped' ? '⏭️' : '❌'} ${testResult} |
            | Docker Build | ${dockerResult === 'success' ? '✅' : dockerResult === 'skipped' ? '⏭️' : '❌'} ${dockerResult} |

            <sub>Triggered by commit ${{ github.sha }}</sub>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
